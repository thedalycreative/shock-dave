<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <radialGradient id="compassGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d5a3" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#3a332b" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0.5"/>
    </radialGradient>
    <radialGradient id="roseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a45a"/>
      <stop offset="100%" stop-color="#3a332b"/>
    </radialGradient>
    <linearGradient id="needleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ede8dd"/>
      <stop offset="100%" stop-color="#c8a45a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0b08"/>
  <!-- Parchment texture hatching -->
  <g stroke="#c8a45a" stroke-width="0.2" opacity="0.04">
    <line x1="0" y1="0" x2="400" y2="8"/><line x1="0" y1="8" x2="400" y2="16"/>
    <line x1="0" y1="16" x2="400" y2="24"/><line x1="0" y1="24" x2="400" y2="32"/>
    <line x1="0" y1="32" x2="400" y2="40"/><line x1="0" y1="40" x2="400" y2="48"/>
    <line x1="0" y1="48" x2="400" y2="56"/><line x1="0" y1="56" x2="400" y2="64"/>
    <line x1="0" y1="64" x2="400" y2="72"/><line x1="0" y1="72" x2="400" y2="80"/>
    <line x1="0" y1="80" x2="400" y2="88"/><line x1="0" y1="88" x2="400" y2="96"/>
    <line x1="0" y1="180" x2="400" y2="188"/><line x1="0" y1="188" x2="400" y2="196"/>
    <line x1="0" y1="196" x2="400" y2="204"/><line x1="0" y1="204" x2="400" y2="212"/>
    <line x1="0" y1="212" x2="400" y2="220"/><line x1="0" y1="220" x2="400" y2="228"/>
    <line x1="0" y1="228" x2="400" y2="236"/><line x1="0" y1="236" x2="400" y2="244"/>
    <line x1="0" y1="244" x2="400" y2="252"/><line x1="0" y1="252" x2="400" y2="260"/>
    <line x1="0" y1="260" x2="400" y2="268"/><line x1="0" y1="268" x2="400" y2="276"/>
    <line x1="0" y1="276" x2="400" y2="284"/><line x1="0" y1="284" x2="400" y2="292"/>
  </g>
  <!-- Decorative border - outer -->
  <rect x="20" y="15" width="360" height="270" rx="5" fill="none" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <!-- Decorative border - inner -->
  <rect x="28" y="23" width="344" height="254" rx="3" fill="none" stroke="#c8a45a" stroke-width="0.5" opacity="0.2"/>
  <!-- Border corner ornaments -->
  <g stroke="#c8a45a" stroke-width="0.6" fill="none" opacity="0.3">
    <!-- Top left -->
    <path d="M28,40 Q35,30 48,23"/><path d="M28,50 Q42,35 55,23"/>
    <circle cx="35" cy="30" r="2"/>
    <!-- Top right -->
    <path d="M372,40 Q365,30 352,23"/><path d="M372,50 Q358,35 345,23"/>
    <circle cx="365" cy="30" r="2"/>
    <!-- Bottom left -->
    <path d="M28,260 Q35,270 48,277"/><path d="M28,250 Q42,265 55,277"/>
    <circle cx="35" cy="270" r="2"/>
    <!-- Bottom right -->
    <path d="M372,260 Q365,270 352,277"/><path d="M372,250 Q358,265 345,277"/>
    <circle cx="365" cy="270" r="2"/>
  </g>
  <!-- Compass rose outer circle -->
  <circle cx="200" cy="150" r="100" fill="url(#compassGrad)" stroke="#c8a45a" stroke-width="1.2"/>
  <circle cx="200" cy="150" r="95" fill="none" stroke="#c8a45a" stroke-width="0.3" opacity="0.4"/>
  <circle cx="200" cy="150" r="90" fill="none" stroke="#c8a45a" stroke-width="0.5" opacity="0.3"/>
  <!-- Degree tick marks -->
  <g stroke="#c8a45a" stroke-width="0.4" opacity="0.3">
    <line x1="200" y1="52" x2="200" y2="58"/><line x1="200" y1="242" x2="200" y2="248"/>
    <line x1="102" y1="150" x2="108" y2="150"/><line x1="292" y1="150" x2="298" y2="150"/>
    <!-- 45 degree marks -->
    <line x1="131" y1="81" x2="135" y2="85"/><line x1="269" y1="81" x2="265" y2="85"/>
    <line x1="131" y1="219" x2="135" y2="215"/><line x1="269" y1="219" x2="265" y2="215"/>
    <!-- Minor ticks -->
    <line x1="155" y1="58" x2="156" y2="63"/><line x1="245" y1="58" x2="244" y2="63"/>
    <line x1="155" y1="242" x2="156" y2="237"/><line x1="245" y1="242" x2="244" y2="237"/>
    <line x1="106" y1="105" x2="111" y2="107"/><line x1="294" y1="105" x2="289" y2="107"/>
    <line x1="106" y1="195" x2="111" y2="193"/><line x1="294" y1="195" x2="289" y2="193"/>
  </g>
  <!-- Main compass rose points - N/S/E/W -->
  <!-- North -->
  <polygon points="200,55 190,135 200,125 210,135" fill="url(#needleGrad)" stroke="#c8a45a" stroke-width="0.6"/>
  <polygon points="200,55 190,135 200,145 210,135" fill="#3a332b" stroke="#c8a45a" stroke-width="0.3" opacity="0.5"/>
  <!-- South -->
  <polygon points="200,245 190,165 200,175 210,165" fill="#3a332b" stroke="#c8a45a" stroke-width="0.6"/>
  <polygon points="200,245 190,165 200,155 210,165" fill="#1a1612" stroke="#c8a45a" stroke-width="0.3" opacity="0.5"/>
  <!-- East -->
  <polygon points="295,150 215,140 225,150 215,160" fill="#3a332b" stroke="#c8a45a" stroke-width="0.6"/>
  <polygon points="295,150 215,140 205,150 215,160" fill="#1a1612" stroke="#c8a45a" stroke-width="0.3" opacity="0.5"/>
  <!-- West -->
  <polygon points="105,150 185,140 175,150 185,160" fill="#3a332b" stroke="#c8a45a" stroke-width="0.6"/>
  <polygon points="105,150 185,140 195,150 185,160" fill="#1a1612" stroke="#c8a45a" stroke-width="0.3" opacity="0.5"/>
  <!-- Secondary points NE/NW/SE/SW -->
  <g stroke="#c8a45a" stroke-width="0.5" opacity="0.5">
    <polygon points="265,85 215,135 225,140 220,130" fill="#3a332b"/>
    <polygon points="135,85 185,135 175,140 180,130" fill="#3a332b"/>
    <polygon points="265,215 215,165 225,160 220,170" fill="#3a332b"/>
    <polygon points="135,215 185,165 175,160 180,170" fill="#3a332b"/>
  </g>
  <!-- Center ornament -->
  <circle cx="200" cy="150" r="12" fill="url(#roseGrad)" stroke="#c8a45a" stroke-width="0.8"/>
  <circle cx="200" cy="150" r="6" fill="#1a1612" stroke="#c8a45a" stroke-width="0.5"/>
  <circle cx="200" cy="150" r="2" fill="#c8a45a"/>
  <!-- Cardinal direction decorative marks -->
  <g opacity="0.4">
    <!-- Decorative dashes representing N/S/E/W labels -->
    <line x1="195" y1="62" x2="205" y2="62" stroke="#ede8dd" stroke-width="0.8"/>
    <line x1="195" y1="238" x2="205" y2="238" stroke="#c8a45a" stroke-width="0.6"/>
    <line x1="288" y1="147" x2="288" y2="153" stroke="#c8a45a" stroke-width="0.6"/>
    <line x1="112" y1="147" x2="112" y2="153" stroke="#c8a45a" stroke-width="0.6"/>
  </g>
  <!-- Fleur-de-lis at North (simplified) -->
  <g transform="translate(200,50)" stroke="#ede8dd" fill="none" stroke-width="0.6" opacity="0.4">
    <path d="M0,-8 Q-3,-5 -2,0 Q-1,3 0,2 Q1,3 2,0 Q3,-5 0,-8"/>
    <path d="M-4,-2 Q-6,-4 -5,-7 Q-4,-8 -3,-6" stroke-width="0.4"/>
    <path d="M4,-2 Q6,-4 5,-7 Q4,-8 3,-6" stroke-width="0.4"/>
  </g>
  <!-- Corner accents -->
  <path d="M10,10 L30,10 M10,10 L10,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,10 L370,10 M390,10 L390,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M10,290 L30,290 M10,290 L10,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,290 L370,290 M390,290 L390,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>
