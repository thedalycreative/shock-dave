<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <radialGradient id="bowlGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#e8d5a3" stop-opacity="0.2"/><stop offset="100%" stop-color="#3a332b"/>
    </radialGradient>
    <radialGradient id="soundGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.12"/><stop offset="100%" stop-color="#c8a45a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0b08"/>
  <ellipse cx="200" cy="180" rx="170" ry="100" fill="url(#soundGlow)"/>
  <!-- Surface -->
  <rect x="0" y="260" width="400" height="40" fill="#1a1612"/>
  <line x1="30" y1="262" x2="370" y2="262" stroke="#3a332b" stroke-width="0.5"/>
  <!-- Shadow under bowl -->
  <ellipse cx="200" cy="260" rx="70" ry="6" fill="#000" opacity="0.2"/>
  <!-- Singing bowl - outer wall -->
  <path d="M115,200 Q110,220 115,240 Q125,260 200,262 Q275,260 285,240 Q290,220 285,200Z" fill="url(#bowlGrad)" stroke="#c8a45a" stroke-width="1.2"/>
  <!-- Bowl rim (top ellipse) -->
  <ellipse cx="200" cy="200" rx="85" ry="18" fill="#1a1612" stroke="#c8a45a" stroke-width="1"/>
  <!-- Inner bowl ellipse -->
  <ellipse cx="200" cy="203" rx="75" ry="14" fill="none" stroke="#c8a45a" stroke-width="0.4" opacity="0.3"/>
  <!-- Decorative bands on bowl -->
  <path d="M118,215 Q200,222 282,215" fill="none" stroke="#c8a45a" stroke-width="0.5" opacity="0.4"/>
  <path d="M116,225 Q200,232 284,225" fill="none" stroke="#c8a45a" stroke-width="0.5" opacity="0.35"/>
  <path d="M118,235 Q200,242 282,235" fill="none" stroke="#c8a45a" stroke-width="0.4" opacity="0.3"/>
  <!-- Etched pattern on bowl -->
  <g stroke="#c8a45a" fill="none" opacity="0.2" stroke-width="0.4">
    <path d="M140,220 Q150,218 160,220 Q170,222 180,220"/>
    <path d="M220,220 Q230,218 240,220 Q250,222 260,220"/>
    <path d="M155,230 Q165,228 175,230 Q185,232 195,230"/>
    <path d="M205,230 Q215,228 225,230 Q235,232 245,230"/>
  </g>
  <!-- Bowl inner reflection -->
  <path d="M135,200 Q140,208 140,212" stroke="#ede8dd" stroke-width="0.8" fill="none" opacity="0.06"/>
  <!-- Mallet/striker -->
  <g transform="translate(290,155) rotate(25)">
    <!-- Handle -->
    <rect x="-4" y="0" width="8" height="80" rx="2" fill="url(#bowlGrad)" stroke="#c8a45a" stroke-width="0.7"/>
    <!-- Handle wrap -->
    <g stroke="#c8a45a" stroke-width="0.3" opacity="0.3">
      <line x1="-3" y1="35" x2="3" y2="35"/><line x1="-3" y1="40" x2="3" y2="40"/>
      <line x1="-3" y1="45" x2="3" y2="45"/><line x1="-3" y1="50" x2="3" y2="50"/>
    </g>
    <!-- Padded head -->
    <circle cx="0" cy="-5" r="12" fill="#3a332b" stroke="#c8a45a" stroke-width="0.8"/>
    <circle cx="0" cy="-5" r="8" fill="none" stroke="#c8a45a" stroke-width="0.3" opacity="0.3"/>
  </g>
  <!-- Sound wave rings emanating upward from bowl -->
  <g fill="none" stroke="#c8a45a">
    <ellipse cx="200" cy="185" rx="30" ry="8" stroke-width="0.8" opacity="0.5"/>
    <ellipse cx="200" cy="170" rx="55" ry="12" stroke-width="0.7" opacity="0.35"/>
    <ellipse cx="200" cy="150" rx="80" ry="16" stroke-width="0.6" opacity="0.25"/>
    <ellipse cx="200" cy="125" rx="110" ry="20" stroke-width="0.5" opacity="0.15"/>
    <ellipse cx="200" cy="95" rx="140" ry="24" stroke-width="0.4" opacity="0.1"/>
    <ellipse cx="200" cy="60" rx="170" ry="28" stroke-width="0.3" opacity="0.06"/>
  </g>
  <!-- Vibration particles -->
  <g fill="#c8a45a" opacity="0.2">
    <circle cx="130" cy="160" r="1.5"/><circle cx="270" cy="155" r="1.2"/><circle cx="160" cy="130" r="1"/>
    <circle cx="240" cy="125" r="1.3"/><circle cx="110" cy="120" r="0.8"/><circle cx="290" cy="115" r="1"/>
    <circle cx="145" cy="100" r="1.2"/><circle cx="255" cy="95" r="0.9"/><circle cx="180" cy="75" r="1"/>
    <circle cx="220" cy="70" r="0.8"/><circle cx="100" cy="85" r="0.7"/><circle cx="300" cy="80" r="0.8"/>
    <circle cx="170" cy="50" r="0.6"/><circle cx="230" cy="45" r="0.7"/>
    <circle cx="80" cy="100" r="0.5"/><circle cx="320" cy="95" r="0.6"/>
  </g>
  <!-- Waveform lines in air -->
  <g fill="none" stroke="#c8a45a" stroke-width="0.4" opacity="0.12">
    <path d="M50,160 Q60,155 70,160 Q80,165 90,160 Q100,155 110,160"/>
    <path d="M290,150 Q300,145 310,150 Q320,155 330,150 Q340,145 350,150"/>
    <path d="M60,110 Q70,105 80,110 Q90,115 100,110"/>
    <path d="M300,100 Q310,95 320,100 Q330,105 340,100"/>
  </g>
  <!-- Corner accents -->
  <path d="M10,10 L30,10 M10,10 L10,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,10 L370,10 M390,10 L390,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M10,290 L30,290 M10,290 L10,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,290 L370,290 M390,290 L390,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>