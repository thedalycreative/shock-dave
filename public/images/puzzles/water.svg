<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <radialGradient id="dropGrad" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ede8dd" stop-opacity="0.3"/>
      <stop offset="40%" stop-color="#c8a45a" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3a332b" stop-opacity="0.5"/>
    </radialGradient>
    <linearGradient id="waveGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="waveGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="waterGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#c8a45a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0b08"/>
  <ellipse cx="200" cy="140" rx="180" ry="120" fill="url(#waterGlow)"/>
  <!-- Steam wisps rising -->
  <g fill="none" stroke="#c8a45a" opacity="0.12">
    <path d="M80,200 Q75,180 82,160 Q88,140 80,120 Q72,100 80,80" stroke-width="1.5"/>
    <path d="M130,210 Q125,185 132,160 Q138,135 130,110 Q122,90 130,65" stroke-width="1.2"/>
    <path d="M270,205 Q275,180 268,155 Q262,130 270,105 Q278,85 270,60" stroke-width="1.2"/>
    <path d="M320,200 Q325,178 318,155 Q312,135 320,115 Q328,95 320,75" stroke-width="1"/>
    <path d="M200,195 Q195,170 202,145 Q208,120 200,95 Q192,75 200,50" stroke-width="0.8"/>
    <path d="M170,200 Q165,178 172,155 Q178,132 170,110" stroke-width="0.6"/>
    <path d="M240,202 Q245,180 238,158 Q232,136 240,115" stroke-width="0.6"/>
  </g>
  <!-- Layered water waves - back -->
  <path d="M0,240 Q50,230 100,238 Q150,246 200,235 Q250,224 300,236 Q350,248 400,238 L400,300 L0,300 Z" fill="url(#waveGrad2)" stroke="#c8a45a" stroke-width="0.5" opacity="0.4"/>
  <!-- Middle wave -->
  <path d="M0,255 Q60,242 120,252 Q180,262 240,248 Q300,234 360,248 Q380,252 400,250 L400,300 L0,300 Z" fill="url(#waveGrad1)" stroke="#c8a45a" stroke-width="0.6" opacity="0.5"/>
  <!-- Front wave -->
  <path d="M0,270 Q50,260 100,268 Q150,276 200,265 Q250,254 300,266 Q350,278 400,268 L400,300 L0,300 Z" fill="#1a1612" stroke="#c8a45a" stroke-width="0.8" opacity="0.7"/>
  <!-- Wave detail lines -->
  <g fill="none" stroke="#c8a45a" stroke-width="0.3" opacity="0.2">
    <path d="M10,262 Q40,256 70,262 Q100,268 130,260"/>
    <path d="M140,258 Q170,252 200,258 Q230,264 260,256"/>
    <path d="M270,260 Q300,254 330,262 Q360,268 390,260"/>
  </g>
  <!-- Large central water droplet -->
  <g transform="translate(200,130)">
    <!-- Drop shape -->
    <path d="M0,-60 Q-25,-20 -25,10 Q-25,40 0,50 Q25,40 25,10 Q25,-20 0,-60" fill="url(#dropGrad)" stroke="#c8a45a" stroke-width="1.2"/>
    <!-- Internal reflection - main -->
    <path d="M-10,-30 Q-15,-10 -12,10 Q-10,25 -5,30" fill="none" stroke="#ede8dd" stroke-width="1" opacity="0.15"/>
    <!-- Highlight spot -->
    <ellipse cx="-8" cy="-15" rx="4" ry="6" fill="#ede8dd" opacity="0.1"/>
    <!-- Internal caustic lines -->
    <path d="M8,-20 Q5,0 8,20" fill="none" stroke="#c8a45a" stroke-width="0.3" opacity="0.2"/>
    <path d="M12,-10 Q10,5 12,15" fill="none" stroke="#c8a45a" stroke-width="0.2" opacity="0.15"/>
    <!-- Bottom reflection -->
    <path d="M-15,25 Q0,35 15,25" fill="none" stroke="#ede8dd" stroke-width="0.3" opacity="0.1"/>
  </g>
  <!-- Ripple circles -->
  <g fill="none" stroke="#c8a45a" opacity="0.2">
    <ellipse cx="200" cy="210" rx="20" ry="5" stroke-width="0.8"/>
    <ellipse cx="200" cy="210" rx="35" ry="8" stroke-width="0.6"/>
    <ellipse cx="200" cy="210" rx="55" ry="12" stroke-width="0.5"/>
    <ellipse cx="200" cy="210" rx="80" ry="16" stroke-width="0.4"/>
    <ellipse cx="200" cy="210" rx="110" ry="20" stroke-width="0.3"/>
    <ellipse cx="200" cy="210" rx="145" ry="24" stroke-width="0.2"/>
  </g>
  <!-- Secondary small droplets -->
  <g opacity="0.3">
    <path d="M100,100 Q95,108 95,112 Q95,118 100,120 Q105,118 105,112 Q105,108 100,100" fill="url(#dropGrad)" stroke="#c8a45a" stroke-width="0.5"/>
    <path d="M310,90 Q307,96 307,99 Q307,104 310,105 Q313,104 313,99 Q313,96 310,90" fill="url(#dropGrad)" stroke="#c8a45a" stroke-width="0.5"/>
    <path d="M150,75 Q148,80 148,82 Q148,86 150,87 Q152,86 152,82 Q152,80 150,75" fill="url(#dropGrad)" stroke="#c8a45a" stroke-width="0.4"/>
    <path d="M260,80 Q258,85 258,87 Q258,91 260,92 Q262,91 262,87 Q262,85 260,80" fill="url(#dropGrad)" stroke="#c8a45a" stroke-width="0.4"/>
  </g>
  <!-- Splash particles -->
  <g fill="#c8a45a" opacity="0.2">
    <circle cx="180" cy="195" r="1.5"/><circle cx="220" cy="198" r="1.2"/>
    <circle cx="195" cy="192" r="1"/><circle cx="210" cy="194" r="0.8"/>
    <circle cx="170" cy="200" r="0.8"/><circle cx="230" cy="202" r="1"/>
    <circle cx="188" cy="188" r="0.6"/><circle cx="215" cy="190" r="0.7"/>
  </g>
  <!-- Light reflection on water surface -->
  <g stroke="#ede8dd" stroke-width="0.5" opacity="0.06">
    <line x1="50" y1="245" x2="80" y2="243"/><line x1="120" y1="250" x2="150" y2="246"/>
    <line x1="250" y1="242" x2="280" y2="244"/><line x1="320" y1="250" x2="350" y2="248"/>
  </g>
  <!-- Corner accents -->
  <path d="M10,10 L30,10 M10,10 L10,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,10 L370,10 M390,10 L390,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M10,290 L30,290 M10,290 L10,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,290 L370,290 M390,290 L390,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>
