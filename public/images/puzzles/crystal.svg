<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <linearGradient id="crystalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a3" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3a332b" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="crystalGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1a1612" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="crystalGrad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a332b" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#e8d5a3" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="crystalGlow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#c8a45a" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c8a45a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="groundGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1612"/>
      <stop offset="100%" stop-color="#0d0b08"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0d0b08"/>
  <ellipse cx="200" cy="180" rx="160" ry="100" fill="url(#crystalGlow)"/>
  <!-- Ground/base rock -->
  <path d="M50,260 Q100,250 150,255 Q200,248 250,252 Q300,248 350,258 L380,265 L380,300 L20,300 L20,265 Z" fill="url(#groundGrad2)" stroke="#c8a45a" stroke-width="0.5" opacity="0.8"/>
  <!-- Rock texture -->
  <g stroke="#c8a45a" stroke-width="0.3" opacity="0.15">
    <path d="M60,265 Q90,260 120,268"/><path d="M150,258 Q180,253 210,260"/>
    <path d="M240,255 Q270,250 300,258"/><path d="M310,260 Q340,255 360,262"/>
  </g>
  <!-- Main crystal cluster -->
  <!-- Large center crystal -->
  <g>
    <polygon points="200,60 185,180 215,180" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.8"/>
    <polygon points="200,60 215,180 230,170" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.5"/>
    <polygon points="200,60 185,180 170,172" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.5"/>
    <!-- Facet lines -->
    <line x1="200" y1="60" x2="200" y2="180" stroke="#c8a45a" stroke-width="0.3" opacity="0.3"/>
    <line x1="200" y1="80" x2="190" y2="180" stroke="#e8d5a3" stroke-width="0.2" opacity="0.2"/>
    <line x1="200" y1="80" x2="210" y2="180" stroke="#e8d5a3" stroke-width="0.2" opacity="0.2"/>
    <!-- Light reflection -->
    <path d="M195,90 L192,130 L197,140 L195,90" fill="#ede8dd" opacity="0.08"/>
  </g>
  <!-- Left tall crystal -->
  <g>
    <polygon points="150,95 138,200 162,200" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.8"/>
    <polygon points="150,95 162,200 172,195" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.5"/>
    <polygon points="150,95 138,200 130,196" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.5"/>
    <line x1="150" y1="95" x2="150" y2="200" stroke="#c8a45a" stroke-width="0.3" opacity="0.25"/>
    <path d="M146,115 L143,160 L148,170 L146,115" fill="#ede8dd" opacity="0.06"/>
  </g>
  <!-- Right medium crystal -->
  <g>
    <polygon points="258,110 245,210 270,210" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.8"/>
    <polygon points="258,110 270,210 280,205" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.5"/>
    <polygon points="258,110 245,210 237,206" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.5"/>
    <line x1="258" y1="110" x2="258" y2="210" stroke="#c8a45a" stroke-width="0.3" opacity="0.25"/>
    <path d="M255,130 L252,175 L257,182 L255,130" fill="#ede8dd" opacity="0.06"/>
  </g>
  <!-- Small crystal - far left -->
  <g>
    <polygon points="105,160 95,230 115,230" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.6"/>
    <polygon points="105,160 115,230 122,226" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.4"/>
    <line x1="105" y1="160" x2="105" y2="230" stroke="#c8a45a" stroke-width="0.2" opacity="0.2"/>
  </g>
  <!-- Small crystal - far right -->
  <g>
    <polygon points="305,145 295,220 315,220" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.6"/>
    <polygon points="305,145 315,220 322,215" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.4"/>
    <line x1="305" y1="145" x2="305" y2="220" stroke="#c8a45a" stroke-width="0.2" opacity="0.2"/>
  </g>
  <!-- Tiny crystal - left lean -->
  <g transform="translate(120,200) rotate(-15)">
    <polygon points="0,-35 -6,0 6,0" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.5"/>
    <polygon points="0,-35 6,0 10,-3" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.3"/>
  </g>
  <!-- Tiny crystal - right lean -->
  <g transform="translate(280,205) rotate(10)">
    <polygon points="0,-30 -5,0 5,0" fill="url(#crystalGrad1)" stroke="#c8a45a" stroke-width="0.5"/>
    <polygon points="0,-30 5,0 9,-2" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.3"/>
  </g>
  <!-- Tiny crystal shard - center front -->
  <g transform="translate(215,230) rotate(8)">
    <polygon points="0,-20 -4,0 4,0" fill="url(#crystalGrad2)" stroke="#c8a45a" stroke-width="0.4"/>
  </g>
  <g transform="translate(178,235) rotate(-5)">
    <polygon points="0,-18 -3,0 3,0" fill="url(#crystalGrad3)" stroke="#c8a45a" stroke-width="0.4"/>
  </g>
  <!-- Scattered small crystals at base -->
  <g fill="#c8a45a" opacity="0.3">
    <polygon points="88,260 85,268 91,268"/>
    <polygon points="320,255 317,262 323,262"/>
    <polygon points="160,262 157,270 163,270"/>
    <polygon points="250,258 247,265 253,265"/>
    <polygon points="340,262 338,268 342,268"/>
    <polygon points="70,264 68,270 72,270"/>
  </g>
  <!-- Light reflection sparkles -->
  <g stroke="#ede8dd" stroke-width="0.8" opacity="0.3">
    <line x1="198" y1="68" x2="202" y2="72"/><line x1="202" y1="68" x2="198" y2="72"/>
    <line x1="148" y1="102" x2="152" y2="106"/><line x1="152" y1="102" x2="148" y2="106"/>
    <line x1="256" y1="118" x2="260" y2="122"/><line x1="260" y1="118" x2="256" y2="122"/>
  </g>
  <!-- Light beam lines from crystals -->
  <g stroke="#c8a45a" stroke-width="0.3" opacity="0.1">
    <line x1="200" y1="60" x2="160" y2="20"/><line x1="200" y1="60" x2="240" y2="15"/>
    <line x1="200" y1="60" x2="280" y2="30"/><line x1="150" y1="95" x2="100" y2="40"/>
    <line x1="258" y1="110" x2="330" y2="50"/>
  </g>
  <!-- Corner accents -->
  <path d="M10,10 L30,10 M10,10 L10,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,10 L370,10 M390,10 L390,30" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M10,290 L30,290 M10,290 L10,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
  <path d="M390,290 L370,290 M390,290 L390,270" stroke="#c8a45a" stroke-width="1" opacity="0.3"/>
</svg>
